name: CI & Deploy (Render)

# Test-gated deploy to Render. Tests run on every push/PR; a deploy is triggered
# only after they pass on `main`, by POSTing a Render Deploy Hook. Render's own
# auto-deploy is OFF (render.yaml: autoDeploy: false), so a red build blocks the
# deploy — Render only ships when this workflow calls the hook.
#
# Required GitHub Actions secret (Settings → Secrets and variables → Actions):
#   RENDER_DEPLOY_HOOK_URL — the web service's Deploy Hook URL
#   (Render dashboard → the service → Settings → Deploy Hook).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No LFS: the test/build don't read the fixture binaries, and skipping
        # the pull avoids burning Git LFS bandwidth on every CI run.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    name: Trigger Render deploy
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: POST Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set — cannot deploy."
            exit 1
          fi
          # -f fails the step on any non-2xx so a deploy that won't start is visible.
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Render deploy triggered." >> "$GITHUB_STEP_SUMMARY"
