name: CI & Deploy (Vercel)

# Test-gated deploy to Vercel via the Vercel CLI (not Vercel's Git integration,
# so a red build blocks the deploy). Tests run on every push/PR; production
# deploys only on a green main.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Required Vercel project env vars (Production), set in the Vercel dashboard:
#   ANTHROPIC_API_KEY, DATABASE_URL (use the POOLED connection string), PGSSLMODE=require
# See docs/deploy-vercel.md for how to obtain the IDs and configure these.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No LFS: the test/build don't read the fixture binaries, and skipping
        # the pull avoids burning Git LFS bandwidth on every CI run.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to Vercel (production)
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings + env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (prebuilt)
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
