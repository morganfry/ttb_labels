services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: labels
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d labels"]
      interval: 5s
      timeout: 3s
      retries: 10
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://app:app@db:5432/labels
      # The bundled Postgres speaks no TLS, so never force SSL for the in-network
      # db — this overrides any PGSSLMODE inherited from .env.local (which is
      # meant for a managed/production Postgres, not this compose stack).
      PGSSLMODE: ""
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
