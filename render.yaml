# Render Blueprint — one-click demo deploy of the TTB label-verification app.

services:
  - type: web
    name: ttb-label-verification
    runtime: docker
    plan: starter
    region: virginia
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health  # unauthenticated 200; stays open when Basic Auth
                                  # is enabled (gating / would 401 the probe).
    autoDeploy: false
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ttb-labels-db
          property: connectionString   # internal (no-SSL) URL, same region
      - key: NODE_ENV
        value: production

databases:
  - name: ttb-labels-db
    plan: basic-256mb
    region: virginia
    postgresMajorVersion: "16"
